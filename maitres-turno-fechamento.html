<script>
window.BENTO_WORKER = "https://bento-portal-contagem.rodrigopcviana.workers.dev";
window.SESSAO_BENTO_LS = 'bento_sessao';
window.sessaoBentoLer = function () {
  try {
    var raw = localStorage.getItem(window.SESSAO_BENTO_LS);
    if (!raw) return null;
    var s = JSON.parse(raw);
    if (!s || !s.token || !s.exp || Date.now() > s.exp) return null;
    return s;
  } catch (e) { return null; }
};
window.sessaoBentoSalvar = function (nivel, token, exp) {
  try { localStorage.setItem(window.SESSAO_BENTO_LS, JSON.stringify({ nivel: nivel, token: token, exp: exp })); } catch (e) {}
};
window.sessaoBentoLimpar = function () {
  try { localStorage.removeItem(window.SESSAO_BENTO_LS); } catch (e) {}
};
window.loginSenhaBento = function (senha) {
  return fetch(window.BENTO_WORKER + '/api/nivel', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ senha: senha }),
  }).then(function (r) {
    if (r.status === 401) return { ok: false, status: 401 };
    if (!r.ok) return { ok: false, status: r.status };
    return r.json().then(function (d) {
      if (d.token) window.sessaoBentoSalvar(d.nivel, d.token, d.exp);
      return { ok: true, nivel: d.nivel, token: d.token };
    });
  }).catch(function () { return { ok: false, status: 0 }; });
};
// Gate padrão das páginas protegidas: sem sessão -> manda pra home logar,
// com volta automática pra cá. "volta" é o NOME DO ARQUIVO atual (lido de
// location.pathname, não o slug de nav — mural.html/maitres-mural.html/
// admin-mural.html compartilham o mesmo slug "mural" pro nav, mas são
// arquivos diferentes; voltar pro slug errado abriria o silo errado depois
// do login). Sessão de nível diferente do exigido (ex.: Equipe abrindo
// maitres-mural.html direto por URL) -> NÃO redireciona (senão a home
// logada devolveria pra cá e viraria loop); mostra mensagem.
window.irParaLoginBento = function () {
  var atual = location.pathname.split('/').pop().replace(/\.html$/, '') || 'index';
  location.replace('index.html?volta=' + encodeURIComponent(atual) + '#acesso');
};
window.exigirNivel = function (niveisOk, slug) {
  var s = window.sessaoBentoLer();
  if (s && niveisOk.indexOf(s.nivel) >= 0) return { ok: true, sessao: s };
  if (!s) { window.irParaLoginBento(); return { ok: false, redirecionou: true }; }
  document.body.innerHTML = '<div class="capa-wrap capa-centro"><p class="capa-sub">'
    + 'Seu acesso atual não abre esta página. '
    + '<a href="index.html">Trocar acesso</a>.</p></div>';
  return { ok: false, nivelAtual: s.nivel };
};
// Injeta um fragmento vindo de /api/protegido/<chave> (vendas/ranking/
// equipe-vendas/feedback-nutricionista — dado que embutido direto no HTML
// público vazaria por URL sem senha, ver PLANO_LOGIN_TOKEN_BENTO.md seção 3).
// innerHTML NÃO executa <script> injetado — recria os nós pra rodar mesmo.
window.injetaProtegido = function (el, htmlTexto) {
  el.innerHTML = htmlTexto;
  el.querySelectorAll('script').forEach(function (velho) {
    var novo = document.createElement('script');
    if (velho.src) novo.src = velho.src; else novo.textContent = velho.textContent;
    velho.replaceWith(novo);
  });
};
window.carregaProtegido = function (chave, containerId) {
  var el = document.getElementById(containerId);
  var s = window.sessaoBentoLer();
  if (!s || !el) return;
  fetch(window.BENTO_WORKER + '/api/protegido/' + chave, { headers: { 'X-Token': s.token } })
    .then(function (r) {
      if (r.status === 401) { el.innerHTML = '<div class="panel"><p>Sua sessão não abre este conteúdo. <a href="index.html">Trocar acesso</a>.</p></div>'; return null; }
      if (!r.ok) { el.innerHTML = '<div class="panel"><p>Falha ao carregar — tente de novo.</p></div>'; return null; }
      return r.json();
    })
    .then(function (d) { if (d && d.conteudo) window.injetaProtegido(el, d.conteudo); })
    .catch(function () { el.innerHTML = '<div class="panel"><p>Sem conexão — tente de novo.</p></div>'; });
};
// Variante pra quando o protegido é DADO (JSON), não HTML pronto — caso da
// página de Vendas (bento/templates/vendas.html): o template já sabia
// renderizar a partir de uma const D populada no load; aqui só troca de
// onde D vem (const embutida -> fetch autenticado) e chama de volta com o
// dado já parseado, sem reimplementar a renderização em si.
window.carregaProtegidoJSON = function (chave, callback, onErro) {
  var s = window.sessaoBentoLer();
  if (!s) return;
  fetch(window.BENTO_WORKER + '/api/protegido/' + chave, { headers: { 'X-Token': s.token } })
    .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
    .then(function (d) { callback(JSON.parse(d.conteudo)); })
    .catch(function (e) { if (onErro) onErro(e); });
};
</script>

<script>window.exigirNivel(["maitres"], "turno-fechamento");</script>
